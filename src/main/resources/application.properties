spring.application.name=Distribuidora_Andina_sac

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/erp_productos?useSSL=false&serverTimezone=America/Lima}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:mysql}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect