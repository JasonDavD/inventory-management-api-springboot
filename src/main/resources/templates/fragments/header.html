<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="header">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} ?: 'Distribuidora Andina S.A.C.'"></title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Tu CSS personalizado -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body th:fragment="navbar">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/home}">Distribuidora Andina S.A.C.</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" data-bs-toggle="dropdown" href="#">Mantenimientos</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" th:href="@{/categorias}">Categorías</a></li>
                            <li><a class="dropdown-item" th:href="@{/unidades}">Unidades</a></li>
                            <li><a class="dropdown-item" th:href="@{/productos}">Productos</a></li>
                            <!-- Mostrar solo si es ADMIN -->
                            <li th:if="${session.rol == 'ADMIN'}">
                                <hr class="dropdown-divider">
                            </li>
                            <li th:if="${session.rol == 'ADMIN'}">
                                <a class="dropdown-item" th:href="@{/usuarios}">Usuarios</a>
                            </li>
                        </ul>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/transacciones}">Transacciones</a>
                    </li>
                </ul>
                <span class="navbar-text text-white me-3">
                    <i class="bi bi-person-circle"></i>
                    <span th:text="${session.nombreCompleto} ?: 'Usuario'"></span>
                    <span class="badge bg-secondary ms-2" th:text="${session.rol} ?: 'ROL'"></span>
                </span>
                <a th:href="@{/logout}" class="btn btn-outline-light btn-sm">Salir</a>
            </div>
        </div>
    </nav>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
