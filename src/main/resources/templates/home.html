<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<!-- Usa el header -->
<head th:replace="fragments/header :: header"></head>

<body>

<!-- Inserta la barra de navegación -->
<div th:replace="fragments/header :: navbar"></div>

<!--d-flex flex-column min-vh-100 PARA QUE MAIN OCUPE TODO EL ALTO -->
<main class="content container mt-4 d-flex flex-column min-vh-100">
    <!-- Mostrar mensajes -->
    <div th:if="${mensaje}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${mensaje}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="text-center mb-4">
        <h2>Bienvenido al Sistema de Gestión</h2>
        <p class="text-muted">Selecciona un módulo para continuar</p>
        <p><strong>Usuario:</strong> <span th:text="${session.nombreCompleto} ?: 'Usuario'"></span></p>
        <p><strong>Rol actual:</strong> <span th:text="${session.rol} ?: 'ROL'"></span></p>
    </div>

    <div class="row g-4 justify-content-center">
		
		<div class="col-md-4">
		    <a th:href="@{/categorias}" class="btn btn-outline-primary w-100 p-4">
		        Gestión de Categorías
		    </a>
		</div>
		
        <div class="col-md-4">
            <a th:href="@{/productos}" class="btn btn-outline-success w-100 p-4">Gestión de Productos</a>
        </div>
		
        <div class="col-md-4">
            <a th:href="@{/inventario}" class="btn btn-outline-warning w-100 p-4">Gestión de Inventario</a>
        </div>
		
		<div class="col-md-4">
			<a th:href="@{/unidades}" class="btn btn-outline-secondary w-100 p-4">Gestión de Unidades</a>
		</div>
		
		<div class="col-md-4" th:if="${session.rol == 'ADMIN'}">
			<a th:href="@{/usuarios}" class="btn btn-outline-danger w-100 p-4">Gestión de Usuarios</a>
		</div>
		
		<div class="col-md-4">
			<a th:href="@{/almacenes}" class="btn btn-outline-info w-100 p-4">Gestión de Almacenes</a>
		</div>
		
		<div class="col-md-4">
			<a th:href="@{/movimientos}" class="btn btn-outline-dark w-100 p-4">Gestión de Movimientos</a>
		</div>
        
    </div>

    <hr class="my-4" />

    <div class="text-center">
        <a th:href="@{/logout}" class="btn btn-danger btn-lg">Cerrar sesión</a>
    </div>
</main>

<!-- Usa el footer -->
<footer th:replace="fragments/footer :: footer"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
