<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/header :: header"></head>

<body>

<!-- Navbar -->
<div th:replace="fragments/header :: navbar"></div>

<main class="content container mt-4 d-flex flex-column min-vh-100">
    
    <!-- Mensajes de éxito/error -->
    <div th:if="${mensaje}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${mensaje}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h3 class="mb-0">Lista de Categorías</h3>
            <button type="button" class="btn btn-light btn-sm" data-bs-toggle="modal" data-bs-target="#modalCategoria" onclick="limpiarFormulario()">
                <i class="bi bi-plus-circle"></i> Nueva Categoría
            </button>
        </div>
        
        <div class="card-body">
            <!-- Buscador -->
            <div class="row mb-3">
                <div class="col-md-6">
                    <div class="input-group">
                        <input type="text" id="searchInput" class="form-control" placeholder="Buscar por nombre o descripción..." onkeyup="filtrarTabla()">
                        <button class="btn btn-outline-secondary" type="button" onclick="document.getElementById('searchInput').value=''; filtrarTabla();">
                            Limpiar
                        </button>
                    </div>
                </div>
                <div class="col-md-6 text-end">
                    <span class="badge bg-info">Total: <span id="totalRegistros" th:text="${#lists.size(lstCategorias)}">0</span></span>
                </div>
            </div>

            <!-- Tabla de categorías -->
			<div class="table-responsive">
			    <table class="table table-striped table-hover" id="tablaCategorias">
			        <thead class="table-dark">
			            <tr>
			                <th>ID</th>
			                <th>Nombre</th>
			                <th>Descripción</th>
			                <th>Estado</th>
			                <th>Última Actualización</th>
			                <th class="text-center">Acciones</th>
			            </tr>
			        </thead>
			        <tbody>
			            <tr th:if="${#lists.isEmpty(lstCategorias)}">
			                <td colspan="6" class="text-center text-muted">No hay categorías registradas</td>
			            </tr>
			            <tr th:each="categoria : ${lstCategorias}">
			                <td th:text="${categoria.id}">1</td>
			                <td th:text="${categoria.nombre}">Bebidas</td>
			                <td th:text="${categoria.descripcion}">Productos líquidos</td>
			                <td>
			                    <span th:if="${categoria.activo}" class="badge bg-success">Activo</span>
			                    <span th:unless="${categoria.activo}" class="badge bg-danger">Inactivo</span>
			                </td>
			                <td th:text="${#temporals.format(categoria.ultimaActualizacion, 'dd/MM/yyyy HH:mm')}">31/10/2025 10:00</td>
			                <td class="text-center">
			                    <!-- Usar data-* attributes en lugar de th:onclick -->
			                    <button class="btn btn-sm btn-warning btn-editar" 
			                            th:data-id="${categoria.id}"
			                            th:data-nombre="${categoria.nombre}"
			                            th:data-descripcion="${categoria.descripcion}"
			                            th:data-activo="${categoria.activo}"
			                            data-bs-toggle="modal" 
			                            data-bs-target="#modalCategoria">
			                        <i class="bi bi-pencil"></i> Editar
			                    </button>
			                    <a th:href="@{/categorias/eliminar/{id}(id=${categoria.id})}" 
			                       class="btn btn-sm btn-danger"
			                       onclick="return confirm('¿Está seguro de eliminar esta categoría?')">
			                        <i class="bi bi-trash"></i> Eliminar
			                    </a>
			                </td>
			            </tr>
			        </tbody>
			    </table>
			</div>
        </div>
    </div>
</main>

<!-- Modal para Crear/Editar Categoría -->
<div class="modal fade" id="modalCategoria" tabindex="-1" aria-labelledby="modalCategoriaLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <form id="formCategoria" th:action="@{/categorias/guardar}" method="post">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalCategoriaLabel">Nueva Categoría</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <!-- Campo oculto para ID (solo para edición) -->
                    <input type="hidden" id="categoriaId" name="id">
                    
                    <div class="mb-3">
                        <label for="nombre" class="form-label">Nombre <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="nombre" name="nombre" required maxlength="80">
                    </div>
                    
                    <div class="mb-3">
                        <label for="descripcion" class="form-label">Descripción</label>
                        <textarea class="form-control" id="descripcion" name="descripcion" rows="3" maxlength="255"></textarea>
                    </div>
                    
                    <div class="mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="activo" name="activo" checked>
                            <label class="form-check-label" for="activo">
                                Activo
                            </label>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-save"></i> Guardar
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<footer th:replace="fragments/footer :: footer"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Scripts personalizados -->
<script th:inline="javascript">
    // Función para filtrar la tabla
    function filtrarTabla() {
        const input = document.getElementById('searchInput');
        const filter = input.value.toUpperCase();
        const table = document.getElementById('tablaCategorias');
        const tr = table.getElementsByTagName('tr');
        let count = 0;

        for (let i = 1; i < tr.length; i++) {
            const tdNombre = tr[i].getElementsByTagName('td')[1];
            const tdDescripcion = tr[i].getElementsByTagName('td')[2];
            
            if (tdNombre && tdDescripcion) {
                const txtNombre = tdNombre.textContent || tdNombre.innerText;
                const txtDescripcion = tdDescripcion.textContent || tdDescripcion.innerText;
                
                if (txtNombre.toUpperCase().indexOf(filter) > -1 || 
                    txtDescripcion.toUpperCase().indexOf(filter) > -1) {
                    tr[i].style.display = '';
                    count++;
                } else {
                    tr[i].style.display = 'none';
                }
            }
        }
        
        // Actualizar contador
        document.getElementById('totalRegistros').textContent = count;
    }

    // Función para limpiar el formulario (nueva categoría)
    function limpiarFormulario() {
        document.getElementById('formCategoria').action = '/categorias/guardar';
        document.getElementById('modalCategoriaLabel').textContent = 'Nueva Categoría';
        document.getElementById('categoriaId').value = '';
        document.getElementById('nombre').value = '';
        document.getElementById('descripcion').value = '';
        document.getElementById('activo').checked = true;
    }

    // Event listener para botones de editar usando data attributes
    document.addEventListener('DOMContentLoaded', function() {
        // Agregar event listener a todos los botones de editar
        document.querySelectorAll('.btn-editar').forEach(function(btn) {
            btn.addEventListener('click', function() {
                const id = this.getAttribute('data-id');
                const nombre = this.getAttribute('data-nombre');
                const descripcion = this.getAttribute('data-descripcion');
                const activo = this.getAttribute('data-activo') === 'true';
                
                // Actualizar el formulario
                document.getElementById('formCategoria').action = '/categorias/actualizar';
                document.getElementById('modalCategoriaLabel').textContent = 'Editar Categoría';
                document.getElementById('categoriaId').value = id;
                document.getElementById('nombre').value = nombre;
                document.getElementById('descripcion').value = descripcion || '';
                document.getElementById('activo').checked = activo;
            });
        });
    });

    // Auto-ocultar mensajes después de 5 segundos
    setTimeout(function() {
        const alerts = document.querySelectorAll('.alert');
        alerts.forEach(function(alert) {
            const bsAlert = new bootstrap.Alert(alert);
            bsAlert.close();
        });
    }, 5000);
</script>

</body>
</html>
